name: VOD Notifier
on:
  schedule:
    - cron: '0 14 * * 5' # Uruchamia się w piątki o 14:00 UTC (16:00 w Polsce w czasie letnim)
  workflow_dispatch: # Pozwala uruchomić akcję ręcznie z poziomu panelu GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja środowiska Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacja wymaganych bibliotek
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Uruchomienie skryptu VOD Notifier
        env:
          WP_EMAIL: ${{ secrets.WP_EMAIL }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
        run: python vod_notifier.py
